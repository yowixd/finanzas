<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00e5a0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mis Finanzas</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f11;--card:#16181c;--card2:#1c1f25;--border:#2a2d35;--green:#00e5a0;--green-dim:#00e5a015;--red:#ff4d6d;--red-dim:#ff4d6d15;--yellow:#ffd166;--yellow-dim:#ffd16615;--text:#e8eaf0;--muted:#6b7280;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;overflow-x:hidden}
body{display:flex;flex-direction:column}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px}
#login-screen.hidden{display:none}
.login-logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--green)}
.login-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:14px}
.login-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;outline:none;transition:border .2s}
.login-input:focus{border-color:var(--green)}
.login-input::placeholder{color:var(--muted)}
.login-btn{padding:14px;border-radius:var(--radius-sm);border:none;background:var(--green);color:var(--bg);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.login-btn:active{opacity:.7}
.login-btn:disabled{opacity:.4;cursor:default}
.login-error{color:var(--red);font-size:12px;min-height:18px;text-align:center}
.login-lockout{color:var(--yellow);font-size:12px;text-align:center}
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#app.visible{display:flex}
.header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.header-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--green)}
.header-meta{font-size:10px;color:var(--muted);text-align:right;line-height:1.6}
.lock-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}
.month-bar{display:flex;gap:8px;padding:8px 16px;overflow:visible;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;flex-wrap:wrap}
.month-chip{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Mono',monospace}
.month-chip.active{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.year-group{position:relative;flex-shrink:0}
.year-btn{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:4px}
.year-btn.has-active{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.year-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:6px;z-index:200;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.year-dropdown.open{display:flex;flex-wrap:wrap;gap:4px}
.ym-chip{padding:5px 10px;border-radius:16px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;text-align:center;min-width:42px}
.ym-chip.active{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:11px 8px;text-align:center;font-size:11px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'DM Mono',monospace}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.content{flex:1;overflow-y:auto;padding:16px;display:none}
.content.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,var(--green-dim) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.hero-amount{font-family:'DM Serif Display',serif;font-size:36px;line-height:1}
.hero-amount.pos{color:var(--green)}
.hero-amount.neg{color:var(--red)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.hero-stat{background:var(--card2);border-radius:var(--radius-sm);padding:12px}
.hero-stat-label{font-size:10px;color:var(--muted);margin-bottom:5px}
.hero-stat-value{font-size:15px;font-weight:500}
.hero-stat-value.green{color:var(--green)}
.hero-stat-value.red{color:var(--red)}
.chart-wrap{position:relative;width:100%}
canvas{display:block;width:100%!important}
.donut-legend{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.legend-item{display:flex;align-items:center;gap:10px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:var(--muted)}
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.tx-item:last-child{border-bottom:none}
.tx-item:active{opacity:.6}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amount{font-size:14px;font-weight:500;flex-shrink:0}
.tx-amount.pos{color:var(--green)}
.tx-amount.neg{color:var(--red)}
.search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;margin-bottom:14px;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--green)}
.search-box::placeholder{color:var(--muted)}
.alert-card{border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.alert-card.warning{background:var(--yellow-dim);border:1px solid #ffd16630}
.alert-card.info{background:var(--green-dim);border:1px solid #00e5a030}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:500;margin-bottom:4px}
.alert-desc{font-size:12px;color:var(--muted);line-height:1.5}
.filter-select{padding:8px 12px;border-radius:10px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Mono',monospace;appearance:auto;flex:1;min-width:0}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-card{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;padding:20px 20px 32px;border:1px solid var(--border);border-bottom:none;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.modal-icon-big{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--card2);flex-shrink:0}
.modal-title{font-size:16px;font-weight:500;line-height:1.3;margin-bottom:4px}
.modal-full-concept{font-size:11px;color:var(--muted);line-height:1.5}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-stat{background:var(--card2);border-radius:var(--radius-sm);padding:12px}
.modal-stat-label{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.modal-stat-value{font-size:14px;font-weight:500}
.modal-stat-value.green{color:var(--green)}
.modal-stat-value.red{color:var(--red)}
.modal-close-btn{width:100%;margin-top:14px;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer}
.modal-close-btn:active{background:var(--card2)}
</style>
</head>
<body>

<div id="login-screen">
  <div style="text-align:center">
    <div class="login-logo">Mis Finanzas</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">Introduce tu frase de paso</div>
  </div>
  <div class="login-form">
    <input class="login-input" id="passphrase-input" type="password" placeholder="Frase de paso..." autocomplete="off" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button class="login-btn" id="login-btn" onclick="tryUnlock()">Entrar</button>
  </div>
  <div class="login-error" id="login-error"></div>
  <div class="login-lockout hidden" id="lockout-msg"></div>
  <button id="install-btn" style="display:none;margin:24px auto 0;padding:12px 32px;background:transparent;border:1px solid var(--green);color:var(--green);border-radius:12px;font-size:14px;cursor:pointer;font-family:var(--font-mono)" onclick="installApp()">Instalar App</button>
</div>

<div id="app">
  <div class="header">
    <div class="header-title">Mis Finanzas</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="header-meta" id="header-meta"></div>
      <button class="lock-btn" onclick="lockApp()">&#x1F512;</button>
    </div>
  </div>
  <div class="month-bar" id="month-bar"></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab(0)">Resumen</button>
    <button class="tab" onclick="showTab(1)">Gastos</button>
    <button class="tab" onclick="showTab(2)">Transacciones</button>
    <button class="tab" onclick="showTab(3)">Alertas</button>
  </div>

  <div class="content active" id="tab0">
    <div class="hero">
      <div class="hero-label">Saldo actual</div>
      <div class="hero-amount pos" id="hero-saldo">—</div>
      <div class="hero-grid">
        <div class="hero-stat">
          <div class="hero-stat-label">Gastos periodo</div>
          <div class="hero-stat-value red" id="stat-gastos">—</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Ingresos periodo</div>
          <div class="hero-stat-value green" id="stat-ingresos">—</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Ultimos 6 meses</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-bar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Por categoria</div>
      <div style="display:flex;justify-content:center">
        <canvas id="chart-donut" style="max-width:200px;max-height:200px"></canvas>
      </div>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>

  <div class="content" id="tab1">
    <input class="search-box" id="search" type="search" placeholder="Buscar..." oninput="drawTxList()">
    <div style="display:flex;gap:6px;margin-bottom:14px;align-items:center">
      <select id="cat-select" class="filter-select" onchange="activeCat=this.value;drawTxList()" style="flex:0 0 auto;max-width:110px;font-size:11px;padding:6px 8px"></select>
      <input id="date-from-gastos" class="filter-select" type="date" onchange="drawTxList()" style="flex:1;font-size:11px;padding:6px 8px">
      <span style="color:var(--muted);font-size:11px;flex-shrink:0">a</span>
      <input id="date-to-gastos" class="filter-select" type="date" onchange="drawTxList()" style="flex:1;font-size:11px;padding:6px 8px">
    </div>
    <div id="tx-list"></div>
  </div>

  <div class="content" id="tab2">
    <div id="transfers-summary"></div>
    <div style="display:flex;gap:6px;margin-bottom:14px;align-items:center">
      <select id="transfer-type-select" class="filter-select" onchange="setTransferFilter(this.value)" style="flex:0 0 auto;max-width:100px;font-size:11px;padding:6px 8px">
        <option value="all">Todos</option>
        <option value="in">Recibido</option>
        <option value="out">Enviado</option>
      </select>
      <input id="date-from-tx" class="filter-select" type="date" onchange="drawTransferList()" style="flex:1;font-size:11px;padding:6px 8px">
      <span style="color:var(--muted);font-size:11px;flex-shrink:0">a</span>
      <input id="date-to-tx" class="filter-select" type="date" onchange="drawTransferList()" style="flex:1;font-size:11px;padding:6px 8px">
    </div>
    <div id="transfers-list"></div>
  </div>

  <div class="content" id="tab3">
    <div id="alerts-list"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal" onclick="closeModalOutside(event)">
  <div class="modal-card">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-icon-big" id="modal-icon">•</div>
      <div style="min-width:0">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-full-concept" id="modal-concept"></div>
      </div>
    </div>
    <div class="modal-grid">
      <div class="modal-stat"><div class="modal-stat-label">Fecha</div><div class="modal-stat-value" id="modal-fecha"></div></div>
      <div class="modal-stat"><div class="modal-stat-label">Importe</div><div class="modal-stat-value" id="modal-importe"></div></div>
      <div class="modal-stat"><div class="modal-stat-label">Categoria</div><div class="modal-stat-value" id="modal-cat"></div></div>
      <div class="modal-stat"><div class="modal-stat-label">Saldo tras op.</div><div class="modal-stat-value" id="modal-saldo"></div></div>
    </div>
    <button class="modal-close-btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
'use strict';
const MAX_ATTEMPTS=3,LOCKOUT_MS=300000,STORAGE_KEY='fin_lockout';
let appData=null,allTx=[],allTransfers=[],activeCat='Todas',currentMonth='all';

const TRANSFER_CATS=['Transferencias/Bizum'];
const EMOJI={'Ingresos':'💰','Alimentación':'🛒','Suscripciones':'📺','Transporte':'🚗','Comida a domicilio':'🛵','Restaurantes/Ocio':'🍽️','Salud':'💊','Compras Online':'📦','Ropa/Moda':'👕','Educación':'📚','Recibos/Servicios':'🏠','Transferencias/Bizum':'💸','Otros':'•'};
const COLORS=['#00e5a0','#ff4d6d','#ffd166','#4cc9f0','#7b5ea7','#f77f00','#06d6a0','#118ab2','#ef476f','#a8dadc'];
const BRANDS={'NETFLIX':'Netflix','SPOTIFY':'Spotify','AMAZON':'Amazon','MERCADONA':'Mercadona','LIDL':'Lidl','CARREFOUR':'Carrefour','ALDI':'Aldi','ALIEXPRESS':'AliExpress','EBAY':'eBay','ZALANDO':'Zalando','SHEIN':'Shein','ZARA':'Zara','PRIMARK':'Primark','MANGO':'Mango','HBO':'HBO','DISNEY':'Disney+','YOUTUBE':'YouTube','TWITCH':'Twitch','REPSOL':'Repsol','CEPSA':'Cepsa','RENFE':'Renfe','UBER':'Uber','CABIFY':'Cabify','GLOVO':'Glovo','JUST EAT':'Just Eat','DELIVEROO':'Deliveroo','MCDONALDS':"McDonald's",'MCDONALD':"McDonald's",'APPLE':'Apple','GOOGLE':'Google','VODAFONE':'Vodafone','MOVISTAR':'Movistar','ORANGE':'Orange','FNAC':'FNAC','DAZN':'DAZN','FARMACIA':'Farmacia','SALVAT':'Salvat','H&M':'H&M','BIZUM':'Bizum','HPY*ED':'Ed. Salvat'};

function simplifyName(c){
  const u=c.toUpperCase();
  for(const[k,v]of Object.entries(BRANDS)){if(u.includes(k))return v;}
  let s=c.replace(/^COMPRA\s+/i,'').replace(/^PAGO MOVIL EN\s+/i,'').replace(/^PAGO EN\s+/i,'')
         .replace(/^RECIBO\s+/i,'').replace(/^TRANSF[A-Z]*\s*(ENVIADA?|RECIBIDA?)?\s*(A|DE)?\s*/i,'')
         .replace(/^BIZUM\s*(ENVIADO|RECIBIDO)?\s*(A|DE)?\s*/i,'');
  s=s.split(',')[0].trim().slice(0,32);
  return s.replace(/\w\S*/g,t=>t.charAt(0).toUpperCase()+t.slice(1).toLowerCase());
}

// Login
function err(m){document.getElementById('login-error').textContent=m;}
function getPass(){return document.getElementById('passphrase-input').value;}
function getLock(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function saveLock(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function isLocked(){const d=getLock();if(!d.until)return false;if(Date.now()<d.until)return true;saveLock({attempts:0});return false;}
function failAttempt(){const d=getLock();const a=(d.attempts||0)+1;if(a>=MAX_ATTEMPTS){const u=Date.now()+LOCKOUT_MS;saveLock({attempts:a,until:u});lockTimer(u);}else saveLock({attempts:a});return a;}
function lockTimer(u){const el=document.getElementById('lockout-msg');el.classList.remove('hidden');const t=()=>{const s=Math.max(0,Math.ceil((u-Date.now())/1000));el.textContent=s>0?`Bloqueado ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`:'' ;if(s>0)setTimeout(t,1000);else{el.classList.add('hidden');saveLock({attempts:0});}};t();}

// Crypto
function b64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function deriveKey(pin,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pin),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(salt),iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);}
async function tryUnlock(){
  const pass=getPass();
  if(!pass){err('Escribe tu frase de paso.');return;}
  if(!APP_DATA.ciphertext){err('Sin datos. Ejecuta el script primero.');return;}
  if(isLocked()){return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Descifrando...';
  err('');
  try{
    await new Promise(r=>setTimeout(r,50));
    const key=await deriveKey(pass,APP_DATA.salt);
    const raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(APP_DATA.nonce)},key,b64(APP_DATA.ciphertext));
    const data=JSON.parse(new TextDecoder().decode(raw));
    saveLock({attempts:0});unlockApp(data);
  }catch{
    const a=failAttempt();const r=MAX_ATTEMPTS-Math.min(a,MAX_ATTEMPTS);
    err(r>0?`Frase incorrecta. ${r} intento${r!==1?'s':''} restante${r!==1?'s':''}.`:'');
  }finally{btn.disabled=false;btn.textContent='Entrar';}
}

function unlockApp(data){
  appData=data;
  allTx=(data.transactions||[]).filter(t=>!TRANSFER_CATS.includes(t.categoria));
  allTransfers=(data.transactions||[]).filter(t=>TRANSFER_CATS.includes(t.categoria));
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  buildMonthBar();renderAll();
}
function lockApp(){
  appData=null;allTx=[];allTransfers=[];currentMonth='all';
  document.getElementById('passphrase-input').value='';err('');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
}

// Month filter
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function buildMonthBar(){
  const months=appData.monthly||[];
  const years={};
  [...months].reverse().forEach(m=>{const[y,mo]=m.mes.split('-');if(!years[y])years[y]=[];years[y].push({k:m.mes,mo:+mo});});
  let html=`<button class="month-chip${currentMonth==='all'?' active':''}" onclick="setMonth('all')">Todos</button>`;
  Object.keys(years).sort((a,b)=>b-a).forEach(y=>{
    const hasActive=years[y].some(m=>m.k===currentMonth);
    const activeLabel=hasActive?years[y].find(m=>m.k===currentMonth):null;
    const label=activeLabel?MN[activeLabel.mo]+' '+y:y;
    html+=`<div class="year-group"><button class="year-btn${hasActive?' has-active':''}" onclick="toggleYear(this,'yd-${y}')">${label} ▾</button>`;
    html+=`<div class="year-dropdown" id="yd-${y}">`;
    years[y].sort((a,b)=>a.mo-b.mo).forEach(m=>{html+=`<button class="ym-chip${m.k===currentMonth?' active':''}" onclick="setMonth('${m.k}')">${MN[m.mo]}</button>`;});
    html+=`</div></div>`;
  });
  document.getElementById('month-bar').innerHTML=html;
}
function toggleYear(btn,id){
  const dd=document.getElementById(id);
  const wasOpen=dd.classList.contains('open');
  document.querySelectorAll('.year-dropdown').forEach(d=>d.classList.remove('open'));
  if(!wasOpen)dd.classList.add('open');
}
function setMonth(m){
  currentMonth=m;
  document.querySelectorAll('.year-dropdown').forEach(d=>d.classList.remove('open'));
  buildMonthBar();
  renderAll();
}
function filtered(list){
  if(currentMonth==='all')return list;
  const[y,mo]=currentMonth.split('-').map(Number);
  return list.filter(t=>{const[,mm,yy]=t.fecha.split('/').map(Number);return yy===y&&mm===mo;});
}

// Render
function fmtA(n){return Math.abs(n).toFixed(2).replace('.',',');}
function fmt(n){return(n>=0?'+':'')+n.toFixed(2).replace('.',',')+' €';}

function renderAll(){
  if(!appData)return;
  const meta=appData.meta||{};
  document.getElementById('header-meta').innerHTML=`Actualizado: ${APP_DATA.updated||'—'}<br>${meta.fecha_desde||''} → ${meta.fecha_hasta||''}`;
  renderHero();renderBarChart();renderDonutChart();
  renderTransactions();renderTransfers();renderAlerts();
}

function renderHero(){
  const tx=filtered([...allTx,...allTransfers]);
  const g=tx.filter(t=>t.importe<0).reduce((s,t)=>s+Math.abs(t.importe),0);
  const i=tx.filter(t=>t.importe>0).reduce((s,t)=>s+t.importe,0);
  const saldo=appData.resumen_mes?.saldo_actual||0;
  const el=document.getElementById('hero-saldo');
  el.textContent=fmtA(saldo)+' €';el.className='hero-amount '+(saldo>=0?'pos':'neg');
  document.getElementById('stat-gastos').textContent=fmtA(g)+' €';
  document.getElementById('stat-ingresos').textContent=fmtA(i)+' €';
}

function renderBarChart(){
  const canvas=document.getElementById('chart-bar');
  const monthly=(appData.monthly||[]).slice(-6);
  if(!monthly.length)return;
  const dpr=window.devicePixelRatio||1,W=canvas.parentElement.clientWidth,H=180;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={l:8,r:8,t:10,b:28},n=monthly.length,mx=Math.max(...monthly.map(m=>Math.max(m.gastos,m.ingresos)),1);
  const bw=(W-pad.l-pad.r)/n,bw2=bw*.35;
  const names=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  monthly.forEach((m,i)=>{
    const x=pad.l+i*bw+bw/2;
    const gh=m.gastos/mx*(H-pad.t-pad.b);
    ctx.fillStyle='rgba(255,77,109,.75)';ctx.beginPath();ctx.roundRect(x-bw2-2,H-pad.b-gh,bw2,gh,3);ctx.fill();
    const ih=m.ingresos/mx*(H-pad.t-pad.b);
    ctx.fillStyle='rgba(0,229,160,.75)';ctx.beginPath();ctx.roundRect(x+2,H-pad.b-ih,bw2,ih,3);ctx.fill();
    const[y,mo]=m.mes.split('-');
    const label=names[+mo];
    ctx.fillStyle=currentMonth===m.mes?'#e8eaf0':'#6b7280';
    ctx.font=(currentMonth===m.mes?'bold ':'')+'9px DM Mono,monospace';
    ctx.textAlign='center';ctx.fillText(label,x,H-6);
  });
  ctx.font='9px DM Mono,monospace';ctx.textAlign='left';
  ctx.fillStyle='rgba(255,77,109,.75)';ctx.fillRect(W-88,8,8,8);ctx.fillStyle='#6b7280';ctx.fillText('Gastos',W-77,16);
  ctx.fillStyle='rgba(0,229,160,.75)';ctx.fillRect(W-88,22,8,8);ctx.fillStyle='#6b7280';ctx.fillText('Ingresos',W-77,30);
}

function renderDonutChart(){
  const cats=buildCats();
  const canvas=document.getElementById('chart-donut');
  if(!cats.length)return;
  const SIZE=200,dpr=window.devicePixelRatio||1;
  canvas.width=SIZE*dpr;canvas.height=SIZE*dpr;canvas.style.width=SIZE+'px';canvas.style.height=SIZE+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const cx=SIZE/2,cy=SIZE/2,r=78,ir=48;let angle=-Math.PI/2;
  cats.forEach((c,i)=>{
    const sl=c.pct/100*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sl);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();angle+=sl;
  });
  ctx.beginPath();ctx.arc(cx,cy,ir,0,Math.PI*2);ctx.fillStyle='#16181c';ctx.fill();
  const total=cats.reduce((s,c)=>s+c.total,0);
  ctx.fillStyle='#e8eaf0';ctx.font='bold 12px DM Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(fmtA(total)+' €',cx,cy);
  document.getElementById('donut-legend').innerHTML=cats.map((c,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div><div class="legend-label">${EMOJI[c.categoria]||'•'} ${c.categoria}</div><div style="color:var(--text)">${fmtA(c.total)} €</div><div style="color:var(--muted);font-size:10px;margin-left:4px">${c.pct}%</div></div>`).join('');
}

function buildCats(){
  const tx=filtered(allTx).filter(t=>t.importe<0);
  const map={};tx.forEach(t=>{map[t.categoria]=(map[t.categoria]||0)+Math.abs(t.importe);});
  const total=Object.values(map).reduce((s,v)=>s+v,0)||1;
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([c,v])=>{const pct=+(v/total*100).toFixed(1);return{categoria:c,total:+v.toFixed(2),pct};});
}

// Transactions tab
function dateFilter(list,fromId,toId){
  const fv=document.getElementById(fromId).value;
  const tv=document.getElementById(toId).value;
  if(fv){const[y,m,d]=fv.split('-');const fd=new Date(+y,+m-1,+d);list=list.filter(t=>{const[dd,mm,yy]=t.fecha.split('/').map(Number);return new Date(yy,mm-1,dd)>=fd;});}
  if(tv){const[y,m,d]=tv.split('-');const td=new Date(+y,+m-1,+d,23,59,59);list=list.filter(t=>{const[dd,mm,yy]=t.fecha.split('/').map(Number);return new Date(yy,mm-1,dd)<=td;});}
  return list;
}
function renderTransactions(){
  let cats=['Todas',...new Set(allTx.map(t=>t.categoria))];
  const otros=cats.indexOf('Otros');
  if(otros>1){cats.splice(otros,1);cats.push('Otros');}
  const sel=document.getElementById('cat-select');
  sel.innerHTML=cats.map(c=>`<option value="${c}"${c===activeCat?' selected':''}>${(EMOJI[c]||'•')} ${c}</option>`).join('');
  document.getElementById('date-from-gastos').value='';
  document.getElementById('date-to-gastos').value='';
  drawTxList();
}
function drawTxList(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=filtered(allTx).filter(t=>(activeCat==='Todas'||t.categoria===activeCat)&&(!q||t.concepto.toLowerCase().includes(q)||simplifyName(t.concepto).toLowerCase().includes(q)));
  list=dateFilter(list,'date-from-gastos','date-to-gastos');
  const el=document.getElementById('tx-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Sin resultados</div>';return;}
  el.innerHTML='<div class="card" style="padding:0 16px">'+list.slice(0,150).map((t,i)=>`<div class="tx-item" onclick="openModal(${i},${JSON.stringify(t).replace(/"/g,'&quot;')})"><div class="tx-icon" style="background:${t.importe>=0?'var(--green-dim)':'var(--card2)'}">${EMOJI[t.categoria]||'•'}</div><div class="tx-info"><div class="tx-name">${simplifyName(t.concepto)}</div><div class="tx-meta">${t.fecha} · ${t.categoria}</div></div><div class="tx-amount ${t.importe>=0?'pos':'neg'}">${fmt(t.importe)}</div></div>`).join('')+'</div>';
}

// Modal
function openModal(idx,txStr){
  const t=typeof txStr==='string'?JSON.parse(txStr.replace(/&quot;/g,'"')):txStr;
  document.getElementById('modal-icon').textContent=EMOJI[t.categoria]||'•';
  document.getElementById('modal-title').textContent=simplifyName(t.concepto);
  document.getElementById('modal-concept').textContent=t.concepto;
  document.getElementById('modal-fecha').textContent=t.fecha;
  const imp=document.getElementById('modal-importe');
  imp.textContent=fmt(t.importe);imp.className='modal-stat-value '+(t.importe>=0?'green':'red');
  document.getElementById('modal-cat').textContent=t.categoria;
  document.getElementById('modal-saldo').textContent=t.saldo!=null?fmtA(t.saldo)+' €':'N/D';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function closeModalOutside(e){if(e.target.id==='modal')closeModal();}

// Transfers tab
let transferFilter='all';
function setTransferFilter(f){
  transferFilter=f;
  drawTransferList();
}
function renderTransfers(){
  transferFilter='all';
  document.getElementById('transfer-type-select').value='all';
  document.getElementById('date-from-tx').value='';
  document.getElementById('date-to-tx').value='';
  drawTransferList();
}
function drawTransferList(){
  let list=filtered(allTransfers);
  if(transferFilter==='in')list=list.filter(t=>t.importe>0);
  if(transferFilter==='out')list=list.filter(t=>t.importe<0);
  list=dateFilter(list,'date-from-tx','date-to-tx');
  const totalIn=list.filter(t=>t.importe>0).reduce((s,t)=>s+t.importe,0);
  const totalOut=list.filter(t=>t.importe<0).reduce((s,t)=>s+Math.abs(t.importe),0);
  document.getElementById('transfers-summary').innerHTML=list.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="hero-stat"><div class="hero-stat-label">Recibido</div><div class="hero-stat-value green">${fmtA(totalIn)} €</div></div><div class="hero-stat"><div class="hero-stat-label">Enviado</div><div class="hero-stat-value red">${fmtA(totalOut)} €</div></div></div>`:'';
  const el=document.getElementById('transfers-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">💸</div>Sin transacciones este periodo</div>';return;}
  el.innerHTML='<div class="card" style="padding:0 16px">'+list.slice(0,100).map((t,i)=>`<div class="tx-item" onclick="openModal(${i},${JSON.stringify(t).replace(/"/g,'&quot;')})"><div class="tx-icon" style="background:${t.importe>=0?'var(--green-dim)':'var(--red-dim)'}">${EMOJI[t.categoria]||'•'}</div><div class="tx-info"><div class="tx-name">${simplifyName(t.concepto)}</div><div class="tx-meta">${t.fecha}</div></div><div class="tx-amount ${t.importe>=0?'pos':'neg'}">${fmt(t.importe)}</div></div>`).join('')+'</div>';
}

// Alerts
function renderAlerts(){
  const alerts=appData.alerts||[];
  const el=document.getElementById('alerts-list');
  if(!alerts.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>Sin alertas. Todo en orden.</div>';return;}
  el.innerHTML=alerts.map(a=>`<div class="alert-card ${a.tipo}"><div class="alert-icon">${a.tipo==='warning'?'⚠️':'ℹ️'}</div><div><div class="alert-title">${a.titulo}</div><div class="alert-desc">${a.descripcion}</div></div></div>`).join('');
}

document.addEventListener('click',e=>{if(!e.target.closest('.year-group'))document.querySelectorAll('.year-dropdown').forEach(d=>d.classList.remove('open'));});

// Tabs
function showTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.content').forEach((c,i)=>c.classList.toggle('active',i===idx));
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  const b=document.getElementById('install-btn');
  b.textContent='Instalar App';
  b.style.display='block';
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r=>{
      if(r.outcome==='accepted')document.getElementById('install-btn').style.display='none';
      deferredPrompt=null;
    });
  }else{
    alert('Toca los 3 puntos del menu de Chrome (arriba derecha) y selecciona "Anadir a pantalla de inicio". Luego abre desde el icono nuevo.');
  }
}
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-btn').style.display='none';
});

(function(){
  if(isLocked()){const d=getLock();lockTimer(d.until);}
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(()=>{
      // Show install button after SW registers if prompt hasn't fired
      setTimeout(()=>{
        const b=document.getElementById('install-btn');
        if(b.style.display==='none'){
          b.textContent='Instalar App';
          b.style.display='block';
        }
      },2000);
    }).catch(()=>{});
  }
})();
</script>
